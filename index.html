<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>VIOLETA RGB</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#111;
    color:white;
    margin-top:40px;
}

button{
    width:240px;
    height:70px;
    font-size:24px;
    margin:10px;
    border:none;
    border-radius:15px;
}

#status{
    margin-top:30px;
    font-size:28px;
}

</style>

</head>

<body>

<h1>VIOLETA RGB</h1>

<button onclick="startRecognition()">
🎤 HABLAR
</button>

<div id="status">
Esperando comando...
</div>

<script>

const ESP_IP =
"http://10.206.183.178";

function sendColor(color)
{
    fetch(
        ESP_IP + "/" + color,
        {mode:"no-cors"}
    );

    document.getElementById("status")
    .innerHTML =
    "Comando: " + color;
}

function startRecognition()
{
    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    const recognition =
        new SpeechRecognition();

    recognition.lang = "es-MX";

    recognition.start();

    document.getElementById("status")
    .innerHTML =
    "Escuchando...";

    recognition.onresult = function(event)
    {
        let text =
            event.results[0][0]
            .transcript
            .toLowerCase();

        document.getElementById("status")
        .innerHTML =
        "Escuché: " + text;

        if(text.includes("rojo") ||
           text.includes("red"))
        {
            sendColor("red");
        }

        else if(text.includes("verde") ||
                text.includes("green"))
        {
            sendColor("green");
        }

        else if(text.includes("azul") ||
                text.includes("blue"))
        {
            sendColor("blue");
        }

        else if(text.includes("amarillo") ||
                text.includes("yellow"))
        {
            sendColor("yellow");
        }

        else if(text.includes("morado") ||
                text.includes("purple"))
        {
            sendColor("purple");
        }

        else if(text.includes("rosa") ||
                text.includes("pink"))
        {
            sendColor("pink");
        }

        else if(text.includes("naranja") ||
                text.includes("orange"))
        {
            sendColor("orange");
        }

        else if(text.includes("blanco") ||
                text.includes("white"))
        {
            sendColor("white");
        }

        else if(text.includes("cyan"))
        {
            sendColor("cyan");
        }

        else if(text.includes("lima") ||
                text.includes("lime"))
        {
            sendColor("lime");
        }

        else if(text.includes("apagar") ||
                text.includes("off"))
        {
            sendColor("off");
        }

        else if(text.includes("prender") ||
                text.includes("on"))
        {
            sendColor("on");
        }

        else if(text.includes("arcoiris"))
        {
            sendColor("rainbow");
        }

        else if(text.includes("fiesta"))
        {
            sendColor("party");
        }

        else if(text.includes("policia"))
        {
            sendColor("police");
        }
    };
}

</script>

</body>

</html>
