<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VIOLETA RGB</title>

<style>

body{
    font-family: Arial;
    text-align: center;
    background-color: #111;
    color: white;
    margin-top: 40px;
}

button{
    width: 220px;
    height: 70px;
    font-size: 24px;
    margin: 10px;
    border: none;
    border-radius: 15px;
    color: white;
}

.red{
    background-color: red;
}

.green{
    background-color: green;
}

.blue{
    background-color: blue;
}

.off{
    background-color: gray;
}

.voice{
    background-color: purple;
}

#status{
    margin-top: 30px;
    font-size: 28px;
}

</style>

</head>

<body>

<h1>VIOLETA RGB</h1>

<button class="red"
onclick="sendColor('red')">
RED
</button>

<br>

<button class="green"
onclick="sendColor('green')">
GREEN
</button>

<br>

<button class="blue"
onclick="sendColor('blue')">
BLUE
</button>

<br>

<button class="off"
onclick="sendColor('off')">
OFF
</button>

<br><br>

<button class="voice"
onclick="startRecognition()">
🎤 HABLAR
</button>

<div id="status">
Esperando comando...
</div>

<script>

function sendColor(color)
{
    let url =
        "http://10.184.34.178/" + color;

    document.getElementById("status").innerHTML =
        "Enviando: " + color;

    fetch(url, {
        mode: "no-cors"
    })
    .catch((err) => {
        console.log(err);
    });
}

function startRecognition()
{
    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if(!SpeechRecognition)
    {
        document.getElementById("status").innerHTML =
            "SpeechRecognition no soportado";

        return;
    }

    const recognition =
        new SpeechRecognition();

    recognition.lang = "es-MX";

    recognition.continuous = false;

    recognition.interimResults = false;

    recognition.maxAlternatives = 1;

    document.getElementById("status").innerHTML =
        "Escuchando...";

    recognition.start();

    recognition.onresult = function(event)
    {
        let text =
            event.results[0][0].transcript.toLowerCase();

        document.getElementById("status").innerHTML =
            "Escuché: " + text;

        if(text.includes("rojo"))
        {
            sendColor("red");
        }

        else if(text.includes("verde"))
        {
            sendColor("green");
        }

        else if(text.includes("azul"))
        {
            sendColor("blue");
        }

        else if(text.includes("apagar"))
        {
            sendColor("off");
        }
    };

    recognition.onerror = function(event)
    {
        document.getElementById("status").innerHTML =
            "Error: " + event.error;
    };
}

</script>

</body>
</html>
